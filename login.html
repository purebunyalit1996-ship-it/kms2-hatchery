<!DOCTYPE html>
<html lang="th">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f5132">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KMS2 Login v3.1</title>

<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
html,body{margin:0;max-width:100%;overflow-x:hidden;background:#eef3ef;color:#1f2933}
.loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f5132,#198754);padding:20px}
.loginBox{background:white;border-radius:22px;padding:24px;max-width:430px;width:100%;box-shadow:0 20px 60px #0004}
.loginBox h1{color:#0f5132;margin:0 0 8px;font-size:26px}
.loginBox p{line-height:1.45}
label{font-weight:800;font-size:14px;margin-top:12px;display:block}
input,button{width:100%;max-width:100%;box-sizing:border-box;padding:13px 14px;border-radius:14px;border:1px solid #d0d7de;margin-top:6px;font-size:16px}
button{background:#198754;color:white;border:0;font-weight:900;min-height:48px;cursor:pointer}
button.gray{background:#64748b}
.notice{background:#f8fafc;border:1px solid #d8e3dc;border-radius:16px;padding:13px;margin-top:14px;font-size:14px}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:900;background:#dcfce7;color:#166534}
.small{font-size:13px;color:#64748b;text-align:center}
.roleLine{margin:7px 0;color:#334155}
@media(max-width:700px){
  .loginBox{padding:20px}
  .loginBox h1{font-size:24px}
}
</style>
</head>

<body>
<div class="loginWrap">
  <div class="loginBox">
    <h1>🔐 KMS2 Login</h1>
    <p>เข้าสู่ระบบผู้ดูแล / ผู้ควบคุมเวรตู้ฟัก</p>

    <label>Username</label>
    <input id="user" placeholder="admin หรือ supervisor" autocomplete="username">

    <label>Password</label>
    <input id="pass" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">

    <button onclick="login()">เข้าสู่ระบบ</button>

    <div class="notice">
      <span class="badge">บัญชีทดสอบ</span>
      <p class="roleLine"><b>Admin</b> : admin / 1234</p>
      <p class="roleLine"><b>Supervisor</b> : supervisor / 5678</p>
      <p class="small">Supervisor เข้า Dashboard ได้ แต่ลบข้อมูลไม่ได้</p>
    </div>

    <button class="gray" onclick="location.href='employee.html?v=32'">
      ไปหน้าพนักงาน
    </button>
  </div>
</div>

<script>
function login(){
  const u=document.getElementById("user").value.trim();
  const p=document.getElementById("pass").value.trim();

  if(u==="admin" && p==="1234"){
    sessionStorage.setItem("kms2Role","admin");
    sessionStorage.setItem("kms2Admin","yes");
    location.href="index.html?v=32";
  }
  else if(u==="supervisor" && p==="5678"){
    sessionStorage.setItem("kms2Role","supervisor");
    sessionStorage.setItem("kms2Admin","yes");
    location.href="index.html?v=32";
  }
  else{
    alert("Username หรือ Password ไม่ถูกต้อง");
  }
}

document.addEventListener("keydown", e=>{
  if(e.key==="Enter") login();
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
</body>
</html>
