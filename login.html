/* KMS2 v79 Login Professional UI */
:root{--kms2-primary:#124734;--kms2-border:#dfe7e2;--kms2-text:#17231d;--kms2-muted:#66736d}
.loginWrap{background:linear-gradient(135deg,#0d3f2f,#155c43)}
.loginBox{border:1px solid rgba(255,255,255,.35);box-shadow:0 24px 80px rgba(0,0,0,.24)}
.loginBox h1{color:var(--kms2-primary);font-weight:900;letter-spacing:.01em}
.loginBox p{color:var(--kms2-muted)}
input{border-color:#d8e1dc}
input:focus{outline:none;border-color:#2f7d5f;box-shadow:0 0 0 4px rgba(47,125,95,.12)}
button{background:var(--kms2-primary);box-shadow:0 3px 10px rgba(18,71,52,.14)}
button.gray{background:#5d6b66}
.notice{border-color:var(--kms2-border);background:#f7faf8}
.badge{background:#eef6f2;color:var(--kms2-primary)}



/* =========================================================
   KMS2 v79 Factory Control Center UI
   Visual-only refactor: keep all IDs, functions, workflow.
   ========================================================= */
:root{
  --kms2-bg:#071014;
  --kms2-panel:#0d171d;
  --kms2-panel-2:#111e25;
  --kms2-card:#13232b;
  --kms2-card-soft:#172a33;
  --kms2-border:#263a44;
  --kms2-border-strong:#35515d;
  --kms2-text:#e7f0ee;
  --kms2-muted:#8fa3a2;
  --kms2-primary:#12c77b;
  --kms2-primary-2:#0f9f75;
  --kms2-warning:#f5a524;
  --kms2-danger:#ef4444;
  --kms2-blue:#38bdf8;
  --kms2-radius:10px;

  --kms2-shadow:0 12px 28px rgba(0,0,0,.24);
}
html,body{background:var(--kms2-bg)!important;color:var(--kms2-text)!important;font-family:"Noto Sans Thai",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif!important;letter-spacing:.005em;}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at top left,rgba(18,199,123,.12),transparent 34%),linear-gradient(180deg,rgba(255,255,255,.025),transparent 32%);z-index:-1;}
header{background:linear-gradient(180deg,#0b241d,#071014)!important;border-bottom:1px solid var(--kms2-border)!important;box-shadow:none!important;text-align:left!important;padding:14px 20px!important;}
header h1{font-size:20px!important;line-height:1.2!important;margin:0!important;color:#fff!important;letter-spacing:.02em!important;text-shadow:none!important;}
header h1:before{content:"K2";display:inline-grid;place-items:center;width:34px;height:34px;margin-right:12px;border-radius:7px;background:var(--kms2-warning);color:#0b1114;font-weight:950;font-size:14px;vertical-align:middle;}
header p{margin:4px 0 0 48px!important;color:var(--kms2-muted)!important;font-size:12px!important;letter-spacing:.08em!important;text-transform:uppercase;}
.container{max-width:1240px!important;padding:18px!important;background:transparent!important;}
.card,.loginBox,.workspaceIntro,.toolBox,.stat{background:var(--kms2-panel)!important;color:var(--kms2-text)!important;border:1px solid var(--kms2-border)!important;border-radius:var(--kms2-radius-lg)!important;box-shadow:none!important;}
.card{padding:18px!important;margin-bottom:16px!important;}
.card .card{background:var(--kms2-panel-2)!important;}
h2{color:#f4fbf8!important;font-size:22px!important;line-height:1.2!important;font-weight:900!important;letter-spacing:.01em!important;}

h3{color:#d9f7ec!important;font-weight:850!important;}
.small,label{color:var(--kms2-muted)!important;}
label{font-size:13px!important;font-weight:800!important;letter-spacing:.015em!important;}
.notice{background:#10251d!important;border:1px solid #1e4f3b!important;color:#b7f7d7!important;border-radius:var(--kms2-radius)!important;}
.notice.warn{background:#2a210e!important;border-color:#6d4b12!important;color:#ffd58a!important;}

input,select,textarea{background:#081217!important;color:var(--kms2-text)!important;border:1px solid var(--kms2-border)!important;border-radius:10px!important;box-shadow:none!important;}
input::placeholder,textarea::placeholder{color:#738988!important;}
input:focus,select:focus,textarea:focus{outline:none!important;border-color:var(--kms2-primary)!important;box-shadow:0 0 0 3px rgba(18,199,123,.14)!important;}
button,.nav a,.nav button,.tabs button{background:#1f3a34!important;color:#eafff5!important;border:1px solid #31594f!important;border-radius:10px!important;box-shadow:none!important;font-weight:900!important;letter-spacing:.01em!important;transition:transform .12s ease,border-color .12s ease,background .12s ease!important;}
button:hover,.nav a:hover,.nav button:hover,.tabs button:hover{background:#285548!important;border-color:var(--kms2-primary)!important;filter:none!important;}
button:active,.nav a:active,.tabs button:active{transform:translateY(1px) scale(.99)!important;}
button.danger{background:#4a1717!important;border-color:#7f1d1d!important;color:#fecaca!important;}
button.gray{background:#28343a!important;border-color:#3d4c54!important;color:#d2dde0!important;}

.workspaceNav{max-width:none!important;margin:14px 0 0!important;grid-template-columns:repeat(auto-fit,minmax(112px,1fr))!important;}
.workspaceNav a,.workspaceNav button,.tabs button{min-height:38px!important;padding:8px 10px!important;border-radius:8px!important;font-size:13px!important;}

.tabs{position:sticky!important;top:0!important;z-index:20!important;padding:10px!important;background:rgba(7,16,20,.92)!important;backdrop-filter:blur(10px)!important;border-bottom:1px solid var(--kms2-border)!important;}

.stat.warn{background:#241d0d!important;border-color:#5f4514!important;}

.stat.danger{background:#251111!important;border-color:#5f1b1b!important;}

.loginWrap{background:radial-gradient(circle at top,#123c32,#071014 55%)!important;}

<body>
<div class="loginWrap">
  <div class="loginBox">
    <h1>KMS2 Login</h1>
    <p>ระบบจัดการเวรตู้ฟัก</p>

    <label>Username</label>
    <input id="user" placeholder="admin หรือ supervisor" autocomplete="username">

    <label>Password</label>
    <input id="pass" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">

    <button onclick="login()">เข้าสู่ระบบ</button>

    <div class="notice">
      <span class="badge">บัญชีทดสอบ</span>
      <p class="roleLine"><b>Admin</b> : admin / 1234</p>
      <p class="roleLine"><b>Supervisor</b> : supervisor / 5678</p>
      <p class="small">เข้าสู่ระบบตามสิทธิ์ผู้ใช้งาน</p>
    </div>

    <button class="gray" onclick="location.href="employee.html?v=79"">
      ไปหน้าพนักงาน
    </button>
  </div>
</div>

<script>
function login(){
  const u=document.getElementById("user").value.trim();
  const p=document.getElementById("pass").value.trim();

  if(u==="admin" && p==="1234"){
    sessionStorage.setItem("kms2Role","admin");
    sessionStorage.setItem("kms2Admin","yes");
    location.href="index.html?v=79";
  }
  else if(u==="supervisor" && p==="5678"){
    sessionStorage.setItem("kms2Role","supervisor");
    sessionStorage.setItem("kms2Admin","yes");
    location.href="index.html?v=79";
  }
  else{
    alert("Username หรือ Password ไม่ถูกต้อง");
  }
}

document.addEventListener("keydown", e=>{
  if(e.key==="Enter") login();
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
</body>
