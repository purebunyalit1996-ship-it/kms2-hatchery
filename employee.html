<!DOCTYPE html>
<html lang="th">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f5132">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMS2 เวรพนักงาน</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
body{margin:0;background:#eef3ef;color:#1f2933}
header{background:#0f5132;color:white;padding:24px;text-align:center}
header h1{margin:0;font-size:28px}
header p{margin:8px 0 0}
.nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.nav a,.nav button{width:auto;text-decoration:none;background:#ffffff22;color:white;border:1px solid #ffffff55;padding:9px 14px;border-radius:999px;font-weight:800;cursor:pointer}
.container{max-width:1200px;margin:auto;padding:16px}
.card{background:white;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 6px 20px #0001}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
h2{margin:0 0 12px;color:#0f5132;font-size:18px}
label{font-weight:700;font-size:13px;margin-top:8px;display:block}
input,select,textarea,button{width:100%;padding:11px;border-radius:11px;border:1px solid #d0d7de;margin-top:6px}
button{background:#198754;color:white;border:0;font-weight:800;cursor:pointer}
button.danger{background:#dc2626}
button.gray{background:#64748b}
button.print{background:#0f766e}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.stat{background:#f4faf6;border:1px solid #d8e8dc;border-radius:14px;padding:12px}
.stat b{font-size:22px;color:#0f5132}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.dayname{background:#dff3e8;text-align:center;font-weight:900;color:#0f5132;padding:10px;border-radius:10px}
.cell{min-height:125px;background:#f8faf9;border:1px solid #d8e3dc;border-radius:12px;padding:8px}
.date{font-weight:900;color:#0f5132;margin-bottom:5px}
.chip{background:white;border-left:5px solid #198754;margin-top:6px;padding:7px;border-radius:9px;font-size:12px;box-shadow:0 1px 5px #0001}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:800}
.green{background:#dcfce7;color:#166534}.yellow{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}.blue{background:#dbeafe;color:#1e40af}
table{width:100%;border-collapse:collapse}
th,td{padding:9px;border-bottom:1px solid #e5e7eb;font-size:14px;text-align:left}
th{background:#e8f5ee;color:#0f5132}
.actions{display:flex;gap:6px}
.notice{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:14px;padding:12px;color:#166534}
.loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f5132;padding:20px}
.loginBox{background:white;border-radius:22px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px #0004}
.loginBox h1{color:#0f5132;margin-top:0}
.small{font-size:13px;color:#64748b}
@media print{
  header,.nav,.noPrint{display:none!important}
  body{background:white}
  .card{box-shadow:none;border:1px solid #ddd}
}
@media(max-width:700px){
  header h1{font-size:24px}
  .calendar{grid-template-columns:repeat(2,1fr)}
  .dayname{display:none}
  table{display:block;overflow-x:auto}
}
</style>
</head>
<body>
<header><h1>เวรตู้ฟัก โรงฟักคลองมือไทร 2</h1><p>หน้าพนักงาน: ดูเวร ปฏิทิน และส่งคำขอ</p><div class="nav"><a href="employee.html">📅 ดูเวร</a><button onclick="loadData()">🔄 รีเฟรช</button></div></header>
<div class="container">
<div class="card"><h2>เวรวันนี้</h2><div id="todayDuty" class="notice">กำลังโหลดข้อมูล...</div></div>
<div class="card"><h2>ดูเวรของฉัน</h2><div class="grid"><div><label>เลือกพนักงาน</label><select id="myName"></select></div><div><label>เดือนที่ต้องการดู</label><input type="month" id="myMonth"></div><div><label>&nbsp;</label><button onclick="renderMyDuty()">ดูเวรของฉัน</button></div></div><br><div id="myDutyBox" class="notice">เลือกชื่อ แล้วกดดูเวรของฉัน</div></div>
<div class="card"><h2>ส่งคำขอลา / เปลี่ยนเวร</h2><div class="grid"><div><label>พนักงาน</label><select id="requestStaff"></select></div><div><label>วันที่เกี่ยวข้อง</label><input type="date" id="requestDate"></div><div><label>ประเภทคำขอ</label><select id="requestType"><option>ขอลา</option><option>ขอเปลี่ยนเวร</option></select></div></div><label>รายละเอียด</label><textarea id="requestDetail" placeholder="เช่น ขอเปลี่ยนเวรกับป๋อ / ลาป่วย / ติดธุระ"></textarea><button onclick="sendRequest()">ส่งคำขอ</button></div>
<div class="card"><h2>คำขอของฉัน</h2><div id="myRequestBox" class="notice">เลือกชื่อพนักงานเพื่อดูคำขอ</div></div>
<div class="card"><h2>ปฏิทินเวรรายเดือน</h2><div class="grid"><input type="month" id="monthPicker" onchange="renderCalendar()"><button onclick="loadData()">รีเฟรชข้อมูล</button></div><br><div id="calendarArea"></div></div>
</div>
<script>

const API_URL="https://script.google.com/macros/s/AKfycbxyvvxC1lO6cpWwJ5EUtkhpzm2WvheLhJHBAq_W9u_FHhfPVP_HMGEewAm9BXES2u7ALQ/exec";
let staff=[],shifts=[],duties=[],logs=[],requests=[];
function q(id){return document.getElementById(id)}
function val(id){return q(id).value.trim()}
function jsonp(url){
return new Promise((resolve,reject)=>{
const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*1000);
window[cb]=data=>{resolve(data);delete window[cb];script.remove()};
const script=document.createElement("script");
script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
script.onerror=reject;
document.body.appendChild(script);
});
}
function staffName(r){return r["ชื่อ"]||r["พนักงาน"]||r["Name"]||r["name"]||""}
function shiftName(r){return r["ชื่อกะ"]||r["กะเวร"]||""}
function shiftLabel(r){const n=shiftName(r),s=r["เริ่ม"]||"",e=r["สิ้นสุด"]||"";return n ? `${n} (${s} - ${e})` : "";}
function cleanShift(s){return String(s||"").split("(")[0].trim()}
async function loadData(){
try{
const data=await jsonp(API_URL+"?action=getData");
staff=data.staff||[];shifts=data.shifts||[];duties=data.duties||[];logs=data.logs||[];requests=data.requests||[];
renderAll();
}catch(e){alert("โหลดข้อมูลไม่สำเร็จ")}
}
function optionList(arr, firstText="", withBlank=false){
let html=withBlank?`<option value="">${firstText}</option>`:"";
html+=arr.map(n=>`<option value="${n}">${n}</option>`).join("");
return html;
}
function badge(s){
if(s==="รออนุมัติ")return `<span class="badge yellow">รออนุมัติ</span>`;
if(s==="อนุมัติ")return `<span class="badge green">อนุมัติ</span>`;
if(s==="ปฏิเสธ")return `<span class="badge red">ปฏิเสธ</span>`;
if(s==="ต้องติดตาม")return `<span class="badge yellow">ต้องติดตาม</span>`;
if(s==="ผิดปกติ")return `<span class="badge red">ผิดปกติ</span>`;
if(s==="แก้ไขแล้ว")return `<span class="badge blue">แก้ไขแล้ว</span>`;
return `<span class="badge green">ปกติ</span>`;
}
function renderCalendar(){
const month=val("monthPicker"); if(!month)return;
const [y,m]=month.split("-").map(Number);
const first=new Date(y,m-1,1), last=new Date(y,m,0).getDate(), start=first.getDay();
const names=["อา","จ","อ","พ","พฤ","ศ","ส"];
let html=`<div class="calendar">`;
names.forEach(n=>html+=`<div class="dayname">${n}</div>`);
for(let i=0;i<start;i++)html+=`<div></div>`;
for(let d=1;d<=last;d++){
const date=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const list=duties.filter(x=>String(x["วันที่"]).startsWith(date));
html+=`<div class="cell"><div class="date">${d}</div>${list.length?list.map(x=>`<div class="chip">👤 <b>${x["พนักงาน"]||""}</b><br>🕒 ${x["กะเวร"]||""}<br>🐣 ${x["ตู้"]||""}<br><small>${x["หมายเหตุ"]||""}</small></div>`).join(""):`<small style="color:#94a3b8">ไม่มีเวร</small>`}</div>`;
}
html+=`</div>`;q("calendarArea").innerHTML=html;
}
function renderToday(){
const today=new Date().toISOString().slice(0,10);
const list=duties.filter(x=>String(x["วันที่"]).startsWith(today));
q("todayDuty").innerHTML=list.length?list.map(x=>`<div class="chip">👤 <b>${x["พนักงาน"]||""}</b><br>🕒 ${x["กะเวร"]||""}<br>🐣 ${x["ตู้"]||""}<br>📝 ${x["หมายเหตุ"]||"-"}</div>`).join(""):`<p style="color:#64748b">วันนี้ยังไม่มีข้อมูลเวร</p>`;
}
function setTodayBase(){
const now=new Date(); const today=now.toISOString().slice(0,10);
if(q("monthPicker")) q("monthPicker").value=today.slice(0,7);
if(q("myMonth")) q("myMonth").value=today.slice(0,7);
if(q("requestDate")) q("requestDate").value=today;
if(q("dutyDate")) q("dutyDate").value=today;
if(q("logDate")) q("logDate").value=today;
if(q("logTime")) q("logTime").value=now.toTimeString().slice(0,5);
}

function renderStaffList(){
  const names = staff.map(staffName).filter(Boolean);

  const html =
    `<option value="">เลือกพนักงาน</option>` +
    names.map(n => `<option value="${n}">${n}</option>`).join("");

  q("myName").innerHTML = html;
  q("requestStaff").innerHTML = html;
}
function renderMyDuty(){const name=val("myName"),month=val("myMonth");if(!name)return alert("กรุณาเลือกชื่อพนักงาน");const list=duties.filter(x=>String(x["พนักงาน"]||"").includes(name)&&(month?String(x["วันที่"]||"").startsWith(month):true));q("myDutyBox").innerHTML=list.length?list.map(x=>`<div class="chip">📅 <b>${x["วันที่"]||""}</b><br>👤 ${x["พนักงาน"]||""}<br>🕒 ${x["กะเวร"]||""}<br>🐣 ${x["ตู้"]||""}<br>📝 ${x["หมายเหตุ"]||"-"}</div>`).join(""):`ไม่พบเวรของ ${name} ในเดือนที่เลือก`;renderMyRequests();}
function renderMyRequests(){const name=val("myName")||val("requestStaff");if(!name){q("myRequestBox").innerHTML="เลือกชื่อพนักงานเพื่อดูคำขอ";return;}const list=requests.filter(r=>String(r["พนักงาน"]||"").includes(name)).slice(-10).reverse();q("myRequestBox").innerHTML=list.length?list.map(r=>`<div class="chip">📅 วันที่เกี่ยวข้อง: <b>${r["วันที่เกี่ยวข้อง"]||""}</b><br>📋 ${r["ประเภทคำขอ"]||""}<br>📝 ${r["รายละเอียด"]||""}<br>สถานะ: ${badge(r["สถานะ"])}</div>`).join(""):`ยังไม่มีคำขอของ ${name}`;}
async function sendRequest(){if(!val("requestStaff"))return alert("กรุณาเลือกพนักงาน");if(!val("requestDate"))return alert("กรุณาเลือกวันที่");const url=API_URL+`?action=addRequest&staff=${encodeURIComponent(val("requestStaff"))}&date=${encodeURIComponent(val("requestDate"))}&type=${encodeURIComponent(val("requestType"))}&detail=${encodeURIComponent(val("requestDetail"))}`;await jsonp(url);alert("ส่งคำขอแล้ว");q("requestDetail").value="";q("myName").value=val("requestStaff");await loadData();}
function renderAll(){renderStaffList();renderToday();renderCalendar();renderMyRequests();}
setTodayBase();loadData();
</script>
<script>if ("serviceWorker" in navigator) {navigator.serviceWorker.register("./service-worker.js");}</script>
</body>
</html>
