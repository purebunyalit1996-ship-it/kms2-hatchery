<!DOCTYPE html>
<html lang="th">
<head>
<link rel="manifest" href="manifest-employee.json">
<meta name="theme-color" content="#0f5132">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KMS2 พนักงาน v3.1</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
html,body{margin:0;max-width:100%;overflow-x:hidden;background:#eef3ef;color:#1f2933}
header{background:#0f5132;color:white;padding:20px 12px;text-align:center}
header h1{margin:0;font-size:24px;line-height:1.25}
header p{margin:8px 0 0;font-size:14px}
.container{max-width:900px;margin:auto;padding:10px}
.card{background:white;border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 6px 20px #0001;overflow:hidden}
h2{margin:0 0 12px;color:#0f5132;font-size:21px}
label{font-weight:800;font-size:14px;margin-top:10px;display:block}
input,select,textarea,button{width:100%;max-width:100%;box-sizing:border-box;padding:13px 14px;border-radius:14px;border:1px solid #d0d7de;margin-top:6px;font-size:16px}
button{background:#198754;color:white;border:0;font-weight:900;min-height:46px;cursor:pointer}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;position:sticky;top:0;z-index:10;background:#eef3ef;padding:10px 0}
.tabs button{font-size:13px;padding:9px 4px;border-radius:999px;min-height:42px;background:#64748b}
.tabs button.active{background:#0f5132}
.section{display:none}
.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.notice{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:14px;padding:12px;color:#166534;font-size:14px;line-height:1.45}
.notice.warn{background:#fffbeb;border-color:#fde68a;color:#92400e}
.chip{background:white;border-left:5px solid #198754;margin-top:8px;padding:9px;border-radius:12px;font-size:13px;line-height:1.35;box-shadow:0 1px 5px #0001;word-break:break-word}
.chip.pending{border-left-color:#f59e0b;background:#fffbeb}
.chip.approved{border-left-color:#16a34a;background:#f0fdf4}
.chip.rejected{border-left-color:#dc2626;background:#fef2f2}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:800}
.green{background:#dcfce7;color:#166534}.yellow{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;width:100%}
.dayname{background:#dff3e8;text-align:center;font-weight:900;color:#0f5132;padding:6px 1px;border-radius:7px;font-size:11px}
.cell{min-height:48px;background:#f8faf9;border:1px solid #d8e3dc;border-radius:9px;padding:4px}
.date{font-weight:900;color:#0f5132;font-size:12px;margin-bottom:2px}
.cell small{font-size:9px;color:#94a3b8}
.cell .chip{font-size:9px;line-height:1.1;padding:3px;margin-top:2px;border-left-width:3px;max-height:32px;overflow:hidden}
.small{font-size:13px;color:#64748b}
@media(max-width:700px){
  header h1{font-size:22px}
  .grid{grid-template-columns:1fr!important}
  .tabs{grid-template-columns:repeat(3,1fr)}
  .tabs button{font-size:12px}
}
@media(max-width:390px){
  .tabs{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<header>
  <h1>เวรตู้ฟัก โรงฟักคลองมือไทร 2</h1>
  <p>หน้าพนักงาน v3.1: Compact View</p>
</header>

<div class="container">
  <div class="tabs">
    <button id="tab-today" class="active" onclick="showSection('today')">📌 วันนี้</button>
    <button id="tab-myduty" onclick="showSection('myduty')">👤 ดูเวร</button>
    <button id="tab-request" onclick="showSection('request')">📝 คำขอ</button>
    <button id="tab-status" onclick="showSection('status')">✅ สถานะ</button>
    <button id="tab-calendar" onclick="showSection('calendar')">📅 ปฏิทิน</button>
  </div>

  <section id="section-today" class="section active">
    <div class="card"><h2>เวรวันนี้</h2><div id="todayDuty" class="notice">กำลังโหลดข้อมูล...</div></div>
  </section>

  <section id="section-myduty" class="section">
    <div class="card">
      <h2>ดูเวรของฉัน</h2>
      <div class="grid">
        <div><label>พิมพ์ชื่อพนักงาน</label><input id="myName" list="staffList" placeholder="เช่น ยูร"></div>
        <div><label>เดือนที่ต้องการดู</label><input type="month" id="myMonth"></div>
      </div>
      <button onclick="renderMyDuty()">ดูเวรของฉัน</button>
      <datalist id="staffList"></datalist><br><br>
      <div id="myDutyBox" class="notice">พิมพ์ชื่อ แล้วกดดูเวรของฉัน</div>
    </div>
  </section>

  <section id="section-request" class="section">
    <div class="card">
      <h2>ส่งคำขอลา / เปลี่ยนเวร</h2>
      <div class="grid">
        <div><label>พนักงาน</label><input id="requestStaff" list="staffList" placeholder="เช่น ยูร"></div>
        <div><label>วันที่เกี่ยวข้อง</label><input type="date" id="requestDate"></div>
        <div><label>ประเภทคำขอ</label><select id="requestType"><option>ขอลา</option><option>ขอเปลี่ยนเวร</option></select></div>
      </div>
      <label>รายละเอียด</label>
      <textarea id="requestDetail" placeholder="เช่น ขอเปลี่ยนเวรกับป๋อ / ลาป่วย / ติดธุระ"></textarea>
      <button onclick="sendRequest()">ส่งคำขอ</button>
    </div>
  </section>

  <section id="section-status" class="section">
    <div class="card">
      <h2>สถานะคำขอของฉัน</h2>
      <label>พิมพ์ชื่อเพื่อตรวจสถานะ</label>
      <input id="statusName" list="staffList" placeholder="เช่น ยูร">
      <button onclick="renderMyRequests()">ตรวจสถานะคำขอ</button><br><br>
      <div id="myRequestBox" class="notice warn">พิมพ์ชื่อ แล้วกดตรวจสถานะคำขอ</div>
    </div>
  </section>

  <section id="section-calendar" class="section">
    <div class="card">
      <h2>ปฏิทินเวรรายเดือน</h2>
      <div class="grid">
        <input type="month" id="monthPicker" onchange="renderCalendar()">
        <button onclick="loadData()">รีเฟรชข้อมูล</button>
      </div><br>
      <div id="calendarArea"></div>
      <p class="small">ปฏิทินถูกย่อให้กะทัดรัดสำหรับมือถือ</p>
    </div>
  </section>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxyvvxC1lO6cpWwJ5EUtkhpzm2WvheLhJHBAq_W9u_FHhfPVP_HMGEewAm9BXES2u7ALQ/exec";
let staff=[],duties=[],requests=[];

function q(id){return document.getElementById(id)}
function val(id){return q(id).value.trim()}

function showSection(name){
  ["today","myduty","request","status","calendar"].forEach(x=>{
    q("section-"+x).classList.remove("active");
    q("tab-"+x).classList.remove("active");
  });
  q("section-"+name).classList.add("active");
  q("tab-"+name).classList.add("active");
  if(name==="calendar") renderCalendar();
  if(name==="status") renderMyRequests();
}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*1000);
    window[cb]=data=>{resolve(data);delete window[cb];script.remove()};
    const script=document.createElement("script");
    script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    script.onerror=reject;
    document.body.appendChild(script);
  });
}

function getStaffNames(){
  const a=(staff||[]).map(x=>x["ชื่อ"]||x["พนักงาน"]).filter(Boolean);
  const b=(duties||[]).map(x=>x["พนักงาน"]).filter(Boolean);
  const c=(requests||[]).map(x=>x["พนักงาน"]).filter(Boolean);
  return [...new Set([...a,...b,...c,"ยูร","ป๋อ","นุช","โนรา","ต๋อย"])];
}

async function loadData(){
  try{
    const data=await jsonp(API_URL+"?action=getData");
    staff=data.staff||[];
    duties=data.duties||[];
    requests=data.requests||[];
    renderAll();
  }catch(e){alert("โหลดข้อมูลไม่สำเร็จ")}
}

function badge(s){
  if(s==="รออนุมัติ")return `<span class="badge yellow">รออนุมัติ</span>`;
  if(s==="อนุมัติ")return `<span class="badge green">อนุมัติ</span>`;
  if(s==="ปฏิเสธ")return `<span class="badge red">ปฏิเสธ</span>`;
  return `<span class="badge yellow">${s||"-"}</span>`;
}

function requestClass(s){
  if(s==="อนุมัติ")return "approved";
  if(s==="ปฏิเสธ")return "rejected";
  return "pending";
}

function renderStaffList(){
  q("staffList").innerHTML=getStaffNames().map(n=>`<option value="${n}"></option>`).join("");
}

function renderToday(){
  const today=new Date().toISOString().slice(0,10);
  const list=duties.filter(x=>String(x["วันที่"]).startsWith(today));
  q("todayDuty").innerHTML=list.length?list.map(x=>`<div class="chip">👤 <b>${x["พนักงาน"]||""}</b><br>🕒 ${x["กะเวร"]||""}<br>🐣 ${x["ตู้"]||""}<br>📝 ${x["หมายเหตุ"]||"-"}</div>`).join(""):`วันนี้ยังไม่มีข้อมูลเวร`;
}

function renderMyDuty(){
  const name=val("myName"),month=val("myMonth");
  if(!name)return alert("กรุณาพิมพ์ชื่อพนักงาน");
  const list=duties.filter(x=>String(x["พนักงาน"]||"").includes(name)&&(month?String(x["วันที่"]||"").startsWith(month):true));
  q("myDutyBox").innerHTML=list.length?list.map(x=>`<div class="chip">📅 <b>${x["วันที่"]||""}</b><br>👤 ${x["พนักงาน"]||""}<br>🕒 ${x["กะเวร"]||""}<br>🐣 ${x["ตู้"]||""}<br>📝 ${x["หมายเหตุ"]||"-"}</div>`).join(""):`ไม่พบเวรของ ${name} ในเดือนที่เลือก`;
  q("statusName").value=name;
}

function renderMyRequests(){
  const name=val("statusName")||val("myName")||val("requestStaff");
  if(!name){q("myRequestBox").innerHTML="พิมพ์ชื่อ แล้วกดตรวจสถานะคำขอ";return;}
  const list=requests.filter(r=>String(r["พนักงาน"]||"").includes(name)).slice(-10).reverse();
  q("myRequestBox").innerHTML=list.length?list.map(r=>`<div class="chip ${requestClass(r["สถานะ"])}">📅 วันที่เกี่ยวข้อง: <b>${r["วันที่เกี่ยวข้อง"]||""}</b><br>📋 ${r["ประเภทคำขอ"]||""}<br>📝 ${r["รายละเอียด"]||""}<br>สถานะล่าสุด: ${badge(r["สถานะ"])}</div>`).join(""):`ยังไม่มีคำขอของ ${name}`;
}

async function sendRequest(){
  if(!val("requestStaff"))return alert("กรุณาพิมพ์ชื่อพนักงาน");
  if(!val("requestDate"))return alert("กรุณาเลือกวันที่");
  const url=API_URL+`?action=addRequest&staff=${encodeURIComponent(val("requestStaff"))}&date=${encodeURIComponent(val("requestDate"))}&type=${encodeURIComponent(val("requestType"))}&detail=${encodeURIComponent(val("requestDetail"))}`;
  await jsonp(url);
  alert("ส่งคำขอแล้ว");
  q("requestDetail").value="";
  q("statusName").value=val("requestStaff");
  await loadData();
  showSection("status");
}

function renderCalendar(){
  const month=val("monthPicker"); if(!month)return;
  const [y,m]=month.split("-").map(Number);
  const first=new Date(y,m-1,1), last=new Date(y,m,0).getDate(), start=first.getDay();
  const names=["อา","จ","อ","พ","พฤ","ศ","ส"];
  let html=`<div class="calendar">`;
  names.forEach(n=>html+=`<div class="dayname">${n}</div>`);
  for(let i=0;i<start;i++)html+=`<div></div>`;
  for(let d=1;d<=last;d++){
    const date=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const list=duties.filter(x=>String(x["วันที่"]).startsWith(date));
    html+=`<div class="cell"><div class="date">${d}</div>${list.length?list.slice(0,2).map(x=>`<div class="chip">👤 ${x["พนักงาน"]||""}</div>`).join(""):`<small>ไม่มีเวร</small>`}</div>`;
  }
  html+=`</div>`;
  q("calendarArea").innerHTML=html;
}

function setTodayBase(){
  const today=new Date().toISOString().slice(0,10);
  q("monthPicker").value=today.slice(0,7);
  q("myMonth").value=today.slice(0,7);
  q("requestDate").value=today;
}

function renderAll(){
  renderStaffList();
  renderToday();
  renderCalendar();
  renderMyRequests();
}

setTodayBase();
loadData();
if ("serviceWorker" in navigator) {navigator.serviceWorker.register("./service-worker.js");}
</script>
</body>
</html>
